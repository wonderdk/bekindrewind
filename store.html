<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeKindRewind Video Store</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid #FFD600;
      border-radius: 50%;
      box-shadow: 0 0 0 1px #FFD600;
      pointer-events: none;
    }
    #genreLabel {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #FFD600;
      font-size: 14px;
      pointer-events: none;
      display: none;
      text-transform: uppercase;
      font-weight: bold;
    }
    #dvdOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(15, 22, 40, 0.9);
      display: none;
      pointer-events: all;
      z-index: 100;
    }
    #dvdInfo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #0f1628;
      border: 3px solid #FFD600;
      padding: 30px;
      border-radius: 8px;
      color: #FFD600;
      text-align: center;
      font-size: 16px;
      max-width: 300px;
    }
    #backButton {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background-color: #003087;
      color: #FFD600;
      border: 2px solid #FFD600;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      pointer-events: all;
      z-index: 101;
    }
    #backButton:hover {
      background-color: #005aff;
    }
    #instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #FFD600;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="crosshair"></div>
    <div id="genreLabel"></div>
    <div id="dvdOverlay">
      <div id="dvdInfo">
        <div style="font-size: 20px; margin-bottom: 20px;">Film Title</div>
        <div style="margin-bottom: 20px; font-size: 14px; color: #cccccc;">[Click outside to close]</div>
      </div>
    </div>
    <button id="backButton">← Back to Collection</button>
    <div id="instructions">Click to explore | WASD to move</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    scene.fog = new THREE.Fog(0x1a1a1a, 80, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.7, 18);
    camera.lookAt(0, 1.7, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x333322, 0.8);
    scene.add(ambientLight);

    const genres = ['Horror', 'Drama', 'Action', 'Thriller', 'Sci-Fi', 'Comedy'];
    const aislePositionsX = [-25, -15, -5, 5, 15, 25];
    const genreColors = {
      'Horror': 0x4a0a0a,
      'Drama': 0x3a3a0a,
      'Action': 0x4a2a0a,
      'Thriller': 0x0a0a4a,
      'Sci-Fi': 0x0a3a3a,
      'Comedy': 0x3a3a00,
      'Romance': 0x4a0a2a,
      'Animation': 0x0a3a0a,
      'default': 0x2a2a2a
    };

    const genreLightColors = {
      'Horror': 0x00ff00,
      'Drama': 0xffcc00,
      'Action': 0xffffff,
      'Thriller': 0x0099ff,
      'Sci-Fi': 0x003087,
      'Comedy': 0xffff00
    };

    const floorGeometry = new THREE.PlaneGeometry(60, 40);
    const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.8 });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    const tileGeometry = new THREE.PlaneGeometry(60, 40);
    const tileMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
    const tiles = new THREE.Mesh(tileGeometry, tileMaterial);
    tiles.rotation.x = -Math.PI / 2;
    tiles.position.y = 0.01;
    scene.add(tiles);

    const ceilingGeometry = new THREE.PlaneGeometry(60, 40);
    const ceilingMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.7 });
    const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 4.5;
    scene.add(ceiling);

    const ceilingGridGeometry = new THREE.PlaneGeometry(60, 40);
    const ceilingGridMaterial = new THREE.MeshStandardMaterial({
      color: 0xaaaaaa,
      roughness: 0.9,
      transparent: true,
      opacity: 0.3
    });
    const ceilingGrid = new THREE.Mesh(ceilingGridGeometry, ceilingGridMaterial);
    ceilingGrid.rotation.x = Math.PI / 2;
    ceilingGrid.position.y = 4.45;
    scene.add(ceilingGrid);

    const leftWallLowerGeometry = new THREE.PlaneGeometry(40, 2.7);
    const wallLowerMaterial = new THREE.MeshStandardMaterial({ color: 0x003087, roughness: 0.6 });
    const leftWallLower = new THREE.Mesh(leftWallLowerGeometry, wallLowerMaterial);
    leftWallLower.position.set(-30, 1.35, 0);
    leftWallLower.rotation.y = Math.PI / 2;
    scene.add(leftWallLower);

    const leftWallUpperGeometry = new THREE.PlaneGeometry(40, 1.8);
    const wallUpperMaterial = new THREE.MeshStandardMaterial({ color: 0xFFD600, roughness: 0.6 });
    const leftWallUpper = new THREE.Mesh(leftWallUpperGeometry, wallUpperMaterial);
    leftWallUpper.position.set(-29.99, 3.6, 0);
    leftWallUpper.rotation.y = Math.PI / 2;
    scene.add(leftWallUpper);

    const leftWallStripe = new THREE.PlaneGeometry(40, 0.1);
    const wallStripeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
    const leftStripe = new THREE.Mesh(leftWallStripe, wallStripeMaterial);
    leftStripe.position.set(-30, 2.7, 0);
    leftStripe.rotation.y = Math.PI / 2;
    scene.add(leftStripe);

    const rightWallLower = new THREE.Mesh(leftWallLowerGeometry, wallLowerMaterial);
    rightWallLower.position.set(30, 1.35, 0);
    rightWallLower.rotation.y = -Math.PI / 2;
    scene.add(rightWallLower);

    const rightWallUpper = new THREE.Mesh(leftWallUpperGeometry, wallUpperMaterial);
    rightWallUpper.position.set(29.99, 3.6, 0);
    rightWallUpper.rotation.y = -Math.PI / 2;
    scene.add(rightWallUpper);

    const rightStripe = new THREE.Mesh(leftWallStripe, wallStripeMaterial);
    rightStripe.position.set(30, 2.7, 0);
    rightStripe.rotation.y = -Math.PI / 2;
    scene.add(rightStripe);

    const backWallLower = new THREE.Mesh(new THREE.PlaneGeometry(60, 2.7), wallLowerMaterial);
    backWallLower.position.set(0, 1.35, -20);
    scene.add(backWallLower);

    const backWallUpper = new THREE.Mesh(new THREE.PlaneGeometry(60, 1.8), wallUpperMaterial);
    backWallUpper.position.set(0, 3.6, -19.99);
    scene.add(backWallUpper);

    const backStripe = new THREE.Mesh(new THREE.PlaneGeometry(60, 0.1), wallStripeMaterial);
    backStripe.position.set(0, 2.7, -20);
    scene.add(backStripe);

    const counterGeometry = new THREE.BoxGeometry(4, 0.8, 1.5);
    const counterMaterial = new THREE.MeshStandardMaterial({ color: 0x8B5E3C, roughness: 0.7 });
    const counter = new THREE.Mesh(counterGeometry, counterMaterial);
    counter.position.set(-10, 0.4, -17);
    counter.castShadow = true;
    counter.receiveShadow = true;
    scene.add(counter);

    const shelfLevels = [0.04, 0.64, 1.24];
    const shelfColor = 0x8B5E3C;
    const backingColor = 0x003087;
    let totalDVDCases = 0;
    const dvdCases = [];

    aislePositionsX.forEach((aisleCenterX, aisle) => {
      shelfLevels.forEach(level => {
        const leftShelfGeometry = new THREE.BoxGeometry(1.8, 0.08, 1.8);
        const shelfMaterial = new THREE.MeshStandardMaterial({ color: shelfColor, roughness: 0.7 });
        const leftShelf = new THREE.Mesh(leftShelfGeometry, shelfMaterial);
        leftShelf.position.set(aisleCenterX - 1, level, 0);
        leftShelf.castShadow = true;
        leftShelf.receiveShadow = true;
        scene.add(leftShelf);

        const leftBackGeometry = new THREE.BoxGeometry(0.05, 0.4, 1.8);
        const backingMaterial = new THREE.MeshStandardMaterial({ color: backingColor, roughness: 0.6 });
        const leftBack = new THREE.Mesh(leftBackGeometry, backingMaterial);
        leftBack.position.set(aisleCenterX - 0.95, level + 0.15, 0);
        leftBack.castShadow = true;
        scene.add(leftBack);

        const rightShelf = new THREE.Mesh(leftShelfGeometry, shelfMaterial);
        rightShelf.position.set(aisleCenterX + 1, level, 0);
        rightShelf.castShadow = true;
        rightShelf.receiveShadow = true;
        scene.add(rightShelf);

        const rightBack = new THREE.Mesh(leftBackGeometry, backingMaterial);
        rightBack.position.set(aisleCenterX + 0.95, level + 0.15, 0);
        rightBack.castShadow = true;
        scene.add(rightBack);

        const genre = genres[aisle];
        const dvdColor = genreColors[genre] || genreColors['default'];

        for (let i = 0; i < 4; i++) {
          const case1Geo = new THREE.BoxGeometry(0.38, 0.4, 0.05);
          const variance = 0.8 + (Math.random() - 0.5) * 0.4;
          const variedColor = new THREE.Color(dvdColor).multiplyScalar(variance);
          const variedMaterial = new THREE.MeshBasicMaterial({ color: variedColor });
          const dvdCase = new THREE.Mesh(case1Geo, variedMaterial);
          dvdCase.position.set(aisleCenterX - 1 + (i - 1.5) * 0.38, level + 0.2, 0);
          dvdCase.userData = { genre };
          dvdCases.push(dvdCase);
          scene.add(dvdCase);
          totalDVDCases++;
        }

        for (let i = 0; i < 4; i++) {
          const case2Geo = new THREE.BoxGeometry(0.38, 0.4, 0.05);
          const variance = 0.8 + (Math.random() - 0.5) * 0.4;
          const variedColor = new THREE.Color(dvdColor).multiplyScalar(variance);
          const variedMaterial = new THREE.MeshBasicMaterial({ color: variedColor });
          const dvdCase = new THREE.Mesh(case2Geo, variedMaterial);
          dvdCase.position.set(aisleCenterX + 1 + (i - 1.5) * 0.38, level + 0.2, 0);
          dvdCase.userData = { genre };
          dvdCases.push(dvdCase);
          scene.add(dvdCase);
          totalDVDCases++;
        }
      });

      const signBackGeometry = new THREE.PlaneGeometry(4, 1);
      const signBackMaterial = new THREE.MeshStandardMaterial({ color: backingColor });
      const signBack = new THREE.Mesh(signBackGeometry, signBackMaterial);
      const signZ = genres[aisle] === 'Sci-Fi' ? 8 : -14;
      signBack.position.set(aisleCenterX, 2.5, signZ);
      signBack.castShadow = true;
      scene.add(signBack);

      const signTextGeometry = new THREE.BoxGeometry(3.6, 0.9, 0.02);
      const signTextMaterial = new THREE.MeshStandardMaterial({ color: 0xFFD600 });
      const signText = new THREE.Mesh(signTextGeometry, signTextMaterial);
      signText.position.set(aisleCenterX, 2.5, signZ + 0.03);
      scene.add(signText);

      const pointLight = new THREE.PointLight(genreLightColors[genres[aisle]], 0.9, 15);
      pointLight.position.set(aisleCenterX, 4.3, 0);
      pointLight.castShadow = true;
      scene.add(pointLight);
    });

    console.log(`Total DVD cases placed: ${totalDVDCases}`);

    const wallShelfLevels = [0.3, 0.9, 1.5];
    wallShelfLevels.forEach(level => {
      for (let i = 0; i < 2; i++) {
        const leftWallShelf = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, 0.08, 0.3),
          new THREE.MeshStandardMaterial({ color: shelfColor, roughness: 0.7 })
        );
        leftWallShelf.position.set(-29.5, level, -8 + i * 10);
        leftWallShelf.castShadow = true;
        scene.add(leftWallShelf);
      }

      for (let i = 0; i < 2; i++) {
        const rightWallShelf = new THREE.Mesh(
          new THREE.BoxGeometry(1.5, 0.08, 0.3),
          new THREE.MeshStandardMaterial({ color: shelfColor, roughness: 0.7 })
        );
        rightWallShelf.position.set(29.5, level, -8 + i * 10);
        rightWallShelf.castShadow = true;
        scene.add(rightWallShelf);
      }

      for (let i = 0; i < 3; i++) {
        const backWallShelf = new THREE.Mesh(
          new THREE.BoxGeometry(0.3, 0.08, 1.5),
          new THREE.MeshStandardMaterial({ color: shelfColor, roughness: 0.7 })
        );
        backWallShelf.position.set(-10 + i * 10, level, -19);
        backWallShelf.castShadow = true;
        scene.add(backWallShelf);
      }
    });

    const postColor = 0x3a3a3a;
    aislePositionsX.forEach(aisleCenterX => {
      for (let z of [-10, 10]) {
        const postGeometry = new THREE.BoxGeometry(0.1, 4.5, 0.1);
        const postMaterial = new THREE.MeshStandardMaterial({ color: postColor });
        const leftPost = new THREE.Mesh(postGeometry, postMaterial);
        leftPost.position.set(aisleCenterX - 1.2, 2.25, z);
        leftPost.castShadow = true;
        scene.add(leftPost);

        const rightPost = new THREE.Mesh(postGeometry, postMaterial);
        rightPost.position.set(aisleCenterX + 1.2, 2.25, z);
        rightPost.castShadow = true;
        scene.add(rightPost);
      }
    });

    const keys = {};
    const playerVelocity = new THREE.Vector3();
    const walkSpeed = 0.04;
    const mouseSensitivity = 0.001;
    let pitch = 0;
    let yaw = 0;

    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') renderer.domElement.requestPointerLock();
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    document.addEventListener('click', () => {
      renderer.domElement.requestPointerLock();
    });

    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement === renderer.domElement) {
        yaw -= e.movementX * mouseSensitivity;
        pitch -= e.movementY * mouseSensitivity;
        pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
      }
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(0, 0);
    const genreLabel = document.getElementById('genreLabel');
    const dvdOverlay = document.getElementById('dvdOverlay');
    let hoveredGenre = null;

    document.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    document.addEventListener('click', (e) => {
      if (document.pointerLockElement !== renderer.domElement) {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(dvdCases);
        if (intersects.length > 0) {
          const genre = intersects[0].object.userData.genre;
          document.getElementById('dvdInfo').innerHTML = `
            <div style="font-size: 20px; margin-bottom: 20px;">${genre}</div>
            <div style="margin-bottom: 20px; font-size: 14px; color: #cccccc;">[Click outside to close]</div>
          `;
          dvdOverlay.style.display = 'block';
        }
      }
    });

    dvdOverlay.addEventListener('click', () => {
      dvdOverlay.style.display = 'none';
    });

    document.getElementById('backButton').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    function animate() {
      requestAnimationFrame(animate);

      const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
      const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

      playerVelocity.set(0, 0, 0);
      if (keys['w']) playerVelocity.add(forward.multiplyScalar(walkSpeed));
      if (keys['s']) playerVelocity.add(forward.multiplyScalar(-walkSpeed));
      if (keys['a']) playerVelocity.add(right.multiplyScalar(-walkSpeed));
      if (keys['d']) playerVelocity.add(right.multiplyScalar(walkSpeed));

      let newX = camera.position.x + playerVelocity.x;
      let newZ = camera.position.z + playerVelocity.z;

      if (newX > -29.5 && newX < 29.5) camera.position.x = newX;
      if (newZ > -19.5 && newZ < 20) camera.position.z = newZ;

      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;

      if (playerVelocity.length() > 0) {
        const bobAmount = Math.sin(Date.now() * 0.005) * 0.01;
        camera.position.y = 1.7 + bobAmount;
      } else {
        camera.position.y = 1.7;
      }

      const aisleCenterX = Math.round(camera.position.x / 10) * 10;
      const aisle = aislePositionsX.indexOf(aisleCenterX);

      if (aisle !== -1) {
        const currentGenre = genres[aisle];
        if (hoveredGenre !== currentGenre) {
          hoveredGenre = currentGenre;
        }
      }

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(dvdCases);
      if (intersects.length > 0 && document.pointerLockElement === null) {
        genreLabel.textContent = intersects[0].object.userData.genre;
        genreLabel.style.display = 'block';
      } else {
        genreLabel.style.display = 'none';
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
