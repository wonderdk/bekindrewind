<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbuster Store - 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #backButton {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #FFD700;
            border: 2px solid #FFD700;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            border-radius: 4px;
            z-index: 10;
            transition: all 0.3s;
        }

        #backButton:hover {
            background: #FFD700;
            color: #000;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 215, 0, 0.5);
        }

        #crosshair::before {
            width: 2px;
            height: 10px;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        #crosshair::after {
            width: 10px;
            height: 2px;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
        }

        #infoText {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #FFD700;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border: 1px solid #FFD700;
            z-index: 5;
            pointer-events: none;
        }

        #movieTitle {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border: 1px solid #FFD700;
            z-index: 5;
            pointer-events: none;
            display: none;
            white-space: nowrap;
            max-width: 80vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #detailOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: all;
        }

        #detailContent {
            background: #0f1628;
            color: #ffffff;
            padding: 30px;
            border: 3px solid #FFD600;
            border-radius: 8px;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(255, 214, 0, 0.3);
        }

        #detailContent img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border: 2px solid #FFD600;
            margin-bottom: 15px;
            display: block;
        }

        #detailContent h2 {
            color: #FFD600;
            margin-bottom: 10px;
            font-size: 24px;
        }

        #detailContent p {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        #detailContent strong {
            color: #FFD600;
        }
    </style>
</head>
<body>
    <a id="backButton" href="index.html">← Back to Collection</a>
    <div id="crosshair"></div>
    <div id="infoText">Click to look around | WASD to move | ESC to release mouse</div>
    <div id="movieTitle"></div>
    <div id="detailOverlay">
        <div id="detailContent"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 120, 200);

        const canvas = document.createElement('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.body.appendChild(canvas);

        // Camera setup - start at entrance facing down aisles
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, -15);

        // Store dimensions
        const STORE_WIDTH = 60;
        const STORE_DEPTH = 40;
        const STORE_HEIGHT = 14;
        const CEILING_HEIGHT = 10;
        const FLOOR_Y = 0;

        // Colors (Blockbuster blue/yellow)
        const BLOCKBUSTER_BLUE = 0x003087;
        const BLOCKBUSTER_YELLOW = 0xFFD600;
        const DARK_FLOOR = 0x1a1a1a;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        // Fluorescent lights
        const lightPositions = [
            { x: -15, z: -15 },
            { x: 0, z: -15 },
            { x: 15, z: -15 },
            { x: -15, z: 5 },
            { x: 0, z: 5 },
            { x: 15, z: 5 }
        ];

        lightPositions.forEach(pos => {
            const light = new THREE.PointLight(0xffffff, 0.8, 50);
            light.position.set(pos.x, CEILING_HEIGHT - 0.5, pos.z);
            light.castShadow = true;
            light.shadow.mapSize.width = 512;
            light.shadow.mapSize.height = 512;
            scene.add(light);
        });

        // Floor with geometric carpet pattern
        const floorGeometry = new THREE.PlaneGeometry(STORE_WIDTH, STORE_DEPTH);
        const darkCharcoal = 0x1a1a1a;
        const darkerCharcoal = 0x111111;
        const floorMaterial = new THREE.MeshLambertMaterial({ color: darkCharcoal });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Carpet pattern (subtle darker geometric pattern)
        const carpetPattern = new THREE.Group();
        const tileSize = 3;
        for (let x = -STORE_WIDTH / 2; x < STORE_WIDTH / 2; x += tileSize) {
            for (let z = -STORE_DEPTH / 2; z < STORE_DEPTH / 2; z += tileSize) {
                const tileGeometry = new THREE.PlaneGeometry(tileSize - 0.05, tileSize - 0.05);
                const isPattern = ((Math.floor(x / tileSize) + Math.floor(z / tileSize)) % 3 === 0);
                const color = isPattern ? darkerCharcoal : darkCharcoal;
                const tileMaterial = new THREE.MeshLambertMaterial({ color });
                const tile = new THREE.Mesh(tileGeometry, tileMaterial);
                tile.position.set(x + tileSize / 2, 0.01, z + tileSize / 2);
                tile.rotation.x = -Math.PI / 2;
                carpetPattern.add(tile);
            }
        }
        scene.add(carpetPattern);

        // Ceiling
        const ceilingGeometry = new THREE.PlaneGeometry(STORE_WIDTH, STORE_DEPTH);
        const ceilingMaterial = new THREE.MeshLambertMaterial({ color: 0xcccccc });
        const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
        ceiling.position.y = CEILING_HEIGHT;
        ceiling.rotation.x = Math.PI / 2;
        ceiling.receiveShadow = true;
        scene.add(ceiling);

        // Ceiling tiles (drop ceiling)
        const ceilingTiles = new THREE.Group();
        const tileSizeC = 6;
        for (let x = -STORE_WIDTH / 2; x < STORE_WIDTH / 2; x += tileSizeC) {
            for (let z = -STORE_DEPTH / 2; z < STORE_DEPTH / 2; z += tileSizeC) {
                const tileGeometry = new THREE.PlaneGeometry(tileSizeC - 0.15, tileSizeC - 0.15);
                const tileMaterial = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
                const tile = new THREE.Mesh(tileGeometry, tileMaterial);
                tile.position.set(x + tileSizeC / 2, CEILING_HEIGHT - 0.05, z + tileSizeC / 2);
                tile.rotation.x = Math.PI / 2;
                ceilingTiles.add(tile);
            }
        }
        scene.add(ceilingTiles);

        // Walls - Blockbuster style (yellow upper, navy lower with stripe)
        // Back wall upper (yellow)
        const backWallUpperGeometry = new THREE.PlaneGeometry(STORE_WIDTH, STORE_HEIGHT / 2);
        const backWallUpperMaterial = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_YELLOW });
        const backWallUpper = new THREE.Mesh(backWallUpperGeometry, backWallUpperMaterial);
        backWallUpper.position.set(0, STORE_HEIGHT * 0.75, STORE_DEPTH / 2);
        backWallUpper.castShadow = true;
        backWallUpper.receiveShadow = true;
        scene.add(backWallUpper);

        // Back wall lower (navy)
        const backWallLowerGeometry = new THREE.PlaneGeometry(STORE_WIDTH, STORE_HEIGHT / 2 - 0.4);
        const backWallLowerMaterial = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_BLUE });
        const backWallLower = new THREE.Mesh(backWallLowerGeometry, backWallLowerMaterial);
        backWallLower.position.set(0, STORE_HEIGHT * 0.25, STORE_DEPTH / 2);
        backWallLower.castShadow = true;
        backWallLower.receiveShadow = true;
        scene.add(backWallLower);

        // Back wall dividing stripe
        const backStripeGeometry = new THREE.PlaneGeometry(STORE_WIDTH, 0.4);
        const stripeMaterial = new THREE.MeshLambertMaterial({ color: 0xFFFFFF });
        const backStripe = new THREE.Mesh(backStripeGeometry, stripeMaterial);
        backStripe.position.set(0, STORE_HEIGHT / 2, STORE_DEPTH / 2 + 0.02);
        backStripe.castShadow = true;
        scene.add(backStripe);

        // Front wall upper (yellow) - with opening for entrance
        const frontWallLeftUpper = new THREE.Mesh(
            new THREE.PlaneGeometry(STORE_WIDTH / 2 - 5, STORE_HEIGHT / 2),
            backWallUpperMaterial
        );
        frontWallLeftUpper.position.set(-STORE_WIDTH / 4 - 2.5, STORE_HEIGHT * 0.75, -STORE_DEPTH / 2);
        frontWallLeftUpper.castShadow = true;
        frontWallLeftUpper.receiveShadow = true;
        scene.add(frontWallLeftUpper);

        const frontWallRightUpper = new THREE.Mesh(
            new THREE.PlaneGeometry(STORE_WIDTH / 2 - 5, STORE_HEIGHT / 2),
            backWallUpperMaterial
        );
        frontWallRightUpper.position.set(STORE_WIDTH / 4 + 2.5, STORE_HEIGHT * 0.75, -STORE_DEPTH / 2);
        frontWallRightUpper.castShadow = true;
        frontWallRightUpper.receiveShadow = true;
        scene.add(frontWallRightUpper);

        // Front wall lower (navy)
        const frontWallLeftLower = new THREE.Mesh(
            new THREE.PlaneGeometry(STORE_WIDTH / 2 - 5, STORE_HEIGHT / 2 - 0.4),
            backWallLowerMaterial
        );
        frontWallLeftLower.position.set(-STORE_WIDTH / 4 - 2.5, STORE_HEIGHT * 0.25, -STORE_DEPTH / 2);
        frontWallLeftLower.castShadow = true;
        frontWallLeftLower.receiveShadow = true;
        scene.add(frontWallLeftLower);

        const frontWallRightLower = new THREE.Mesh(
            new THREE.PlaneGeometry(STORE_WIDTH / 2 - 5, STORE_HEIGHT / 2 - 0.4),
            backWallLowerMaterial
        );
        frontWallRightLower.position.set(STORE_WIDTH / 4 + 2.5, STORE_HEIGHT * 0.25, -STORE_DEPTH / 2);
        frontWallRightLower.castShadow = true;
        frontWallRightLower.receiveShadow = true;
        scene.add(frontWallRightLower);

        // Side walls - upper (yellow)
        const sideWallUpperGeometry = new THREE.PlaneGeometry(STORE_DEPTH, STORE_HEIGHT / 2);
        const sideWallUpperMaterial = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_YELLOW });

        const leftWallUpper = new THREE.Mesh(sideWallUpperGeometry, sideWallUpperMaterial);
        leftWallUpper.position.set(-STORE_WIDTH / 2, STORE_HEIGHT * 0.75, 0);
        leftWallUpper.rotation.y = Math.PI / 2;
        leftWallUpper.castShadow = true;
        leftWallUpper.receiveShadow = true;
        scene.add(leftWallUpper);

        const rightWallUpper = new THREE.Mesh(sideWallUpperGeometry, sideWallUpperMaterial);
        rightWallUpper.position.set(STORE_WIDTH / 2, STORE_HEIGHT * 0.75, 0);
        rightWallUpper.rotation.y = -Math.PI / 2;
        rightWallUpper.castShadow = true;
        rightWallUpper.receiveShadow = true;
        scene.add(rightWallUpper);

        // Side walls - lower (navy)
        const sideWallLowerGeometry = new THREE.PlaneGeometry(STORE_DEPTH, STORE_HEIGHT / 2 - 0.4);
        const sideWallLowerMaterial = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_BLUE });

        const leftWallLower = new THREE.Mesh(sideWallLowerGeometry, sideWallLowerMaterial);
        leftWallLower.position.set(-STORE_WIDTH / 2, STORE_HEIGHT * 0.25, 0);
        leftWallLower.rotation.y = Math.PI / 2;
        leftWallLower.castShadow = true;
        leftWallLower.receiveShadow = true;
        scene.add(leftWallLower);

        const rightWallLower = new THREE.Mesh(sideWallLowerGeometry, sideWallLowerMaterial);
        rightWallLower.position.set(STORE_WIDTH / 2, STORE_HEIGHT * 0.25, 0);
        rightWallLower.rotation.y = -Math.PI / 2;
        rightWallLower.castShadow = true;
        rightWallLower.receiveShadow = true;
        scene.add(rightWallLower);

        // Side wall dividing stripes
        const sideStripeGeometry = new THREE.PlaneGeometry(STORE_DEPTH, 0.4);
        const leftStripe = new THREE.Mesh(sideStripeGeometry, stripeMaterial);
        leftStripe.position.set(-STORE_WIDTH / 2 + 0.02, STORE_HEIGHT / 2, 0);
        leftStripe.rotation.y = Math.PI / 2;
        leftStripe.castShadow = true;
        scene.add(leftStripe);

        const rightStripe = new THREE.Mesh(sideStripeGeometry, stripeMaterial);
        rightStripe.position.set(STORE_WIDTH / 2 - 0.02, STORE_HEIGHT / 2, 0);
        rightStripe.rotation.y = -Math.PI / 2;
        rightStripe.castShadow = true;
        scene.add(rightStripe);

        // Front counter
        const counterGeometry = new THREE.BoxGeometry(15, 1.2, 2);
        const counterMaterial = new THREE.MeshLambertMaterial({ color: BLOCKBUSTER_YELLOW });
        const counter = new THREE.Mesh(counterGeometry, counterMaterial);
        counter.position.set(0, 0.6, -STORE_DEPTH / 2 + 3);
        counter.castShadow = true;
        counter.receiveShadow = true;
        scene.add(counter);

        // TV in corner
        const tvGeometry = new THREE.BoxGeometry(3, 2.5, 0.3);
        const tvMaterial = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const tv = new THREE.Mesh(tvGeometry, tvMaterial);
        tv.position.set(STORE_WIDTH / 2 - 3, 2, -STORE_DEPTH / 2 + 3);
        tv.castShadow = true;
        tv.receiveShadow = true;
        scene.add(tv);

        // Shelves and aisles - double-sided tall units per genre
        const genres = ['Horror', 'Romance', 'Action', 'Drama', 'Thriller', 'Sci-Fi'];
        const shelfColliders = [];
        const aisleCenters = [-20, -12, -4, 4, 12, 20];
        const aisleShelves = {};
        const wallShelves = { left: [], right: [] };

        genres.forEach((genre, index) => {
            const xPos = aisleCenters[index];
            const shelfLevels = [0.5, 1.5, 2.5, 3.5];

            // Move shelves back - clear first 4 units from entrance (z: -20 to -16)
            const aisleFrontZ = 18;
            const aisleFrontZZ = -14; // Moved back to clear entrance

            // Create double-sided shelf unit running front-to-back
            const shelfGroup = new THREE.Group();
            shelfGroup.position.set(xPos, 0, 0);

            // Vertical supports (4 posts along the aisle)
            const supportGeometry = new THREE.BoxGeometry(0.3, 2, 0.3);
            const supportMaterial = new THREE.MeshLambertMaterial({ color: 0x555555 });
            const supportZPositions = [-10, -2, 6, 14];

            supportZPositions.forEach(z => {
                const support = new THREE.Mesh(supportGeometry, supportMaterial);
                support.position.set(0, 1, z);
                support.castShadow = true;
                support.receiveShadow = true;
                shelfGroup.add(support);
            });

            // Shelves (4 levels) - thin shelf extending front to back
            const shelfMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });

            shelfLevels.forEach(level => {
                const shelfGeometry = new THREE.BoxGeometry(0.2, 0.2, 32);
                const shelf = new THREE.Mesh(shelfGeometry, shelfMaterial);
                shelf.position.y = level;
                shelf.position.z = 2; // Offset to match front/back z range
                shelf.castShadow = true;
                shelf.receiveShadow = true;
                shelfGroup.add(shelf);
            });

            scene.add(shelfGroup);

            // Store shelf reference for poster placement
            aisleShelves[genre] = {
                xPos: xPos,
                zRange: { min: aisleFrontZZ, max: aisleFrontZ },
                levels: shelfLevels,
                isWall: false
            };

            // Collision box for the aisle
            shelfColliders.push({
                position: new THREE.Vector3(xPos, 0, 0),
                width: 1.5,
                height: 2,
                depth: 32
            });

            // Genre sign hanging above aisle at ceiling
            const canvas2D = document.createElement('canvas');
            canvas2D.width = 256;
            canvas2D.height = 128;
            const ctx = canvas2D.getContext('2d');
            ctx.fillStyle = BLOCKBUSTER_BLUE.toString(16).padStart(6, '0');
            ctx.fillStyle = '#003087';
            ctx.fillRect(0, 0, 256, 128);
            ctx.fillStyle = '#FFD600';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(genre, 128, 64);

            const texture = new THREE.CanvasTexture(canvas2D);
            const signGeometry = new THREE.PlaneGeometry(5, 1.5);
            const signMaterial = new THREE.MeshLambertMaterial({ map: texture });
            const sign = new THREE.Mesh(signGeometry, signMaterial);
            sign.position.set(xPos, CEILING_HEIGHT - 1, 0);
            sign.castShadow = true;
            sign.receiveShadow = true;
            scene.add(sign);

            // Fluorescent strip light along ceiling above this aisle
            const stripLight = new THREE.PointLight(0xffffff, 1.2, 100);
            stripLight.position.set(xPos, CEILING_HEIGHT - 0.3, 0);
            stripLight.castShadow = true;
            stripLight.shadow.mapSize.width = 256;
            stripLight.shadow.mapSize.height = 256;
            scene.add(stripLight);
        });

        // Wall shelves on left and right sides - running full length
        const shelfLevels = [0.5, 1.5, 2.5, 3.5];
        const wallShelfMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });

        // Left wall shelves
        const leftWallShelfGroup = new THREE.Group();
        leftWallShelfGroup.position.set(-STORE_WIDTH / 2 + 1.5, 0, 0);
        shelfLevels.forEach(level => {
            const shelfGeometry = new THREE.BoxGeometry(0.2, 0.2, STORE_DEPTH - 4);
            const shelf = new THREE.Mesh(shelfGeometry, wallShelfMaterial);
            shelf.position.y = level;
            shelf.castShadow = true;
            shelf.receiveShadow = true;
            leftWallShelfGroup.add(shelf);
        });
        scene.add(leftWallShelfGroup);
        wallShelves.left = {
            xPos: -STORE_WIDTH / 2 + 1.5,
            zRange: { min: -STORE_DEPTH / 2 + 2, max: STORE_DEPTH / 2 - 2 },
            levels: shelfLevels,
            isWall: true
        };

        // Right wall shelves
        const rightWallShelfGroup = new THREE.Group();
        rightWallShelfGroup.position.set(STORE_WIDTH / 2 - 1.5, 0, 0);
        shelfLevels.forEach(level => {
            const shelfGeometry = new THREE.BoxGeometry(0.2, 0.2, STORE_DEPTH - 4);
            const shelf = new THREE.Mesh(shelfGeometry, wallShelfMaterial);
            shelf.position.y = level;
            shelf.castShadow = true;
            shelf.receiveShadow = true;
            rightWallShelfGroup.add(shelf);
        });
        scene.add(rightWallShelfGroup);
        wallShelves.right = {
            xPos: STORE_WIDTH / 2 - 1.5,
            zRange: { min: -STORE_DEPTH / 2 + 2, max: STORE_DEPTH / 2 - 2 },
            levels: shelfLevels,
            isWall: true
        };

        // Movie posters data and setup
        let movies = [];
        let posterObjects = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredPoster = null;

        async function loadMovies() {
            try {
                const url = `https://raw.githubusercontent.com/wonderdk/bekindrewind/main/movies.csv?t=${Date.now()}`;
                const response = await fetch(url);
                const csv = await response.text();
                const lines = csv.trim().split('\n');
                const headers = lines[0].split(',').map(h => h.trim());

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    const values = line.split(',').map(v => v.trim().replace(/^["']|["']$/g, ''));
                    const movie = {};
                    headers.forEach((header, idx) => {
                        movie[header] = values[idx] || '';
                    });

                    if (movie.hidden === 'true' || !movie.poster_url) continue;

                    movies.push(movie);
                }

                // Group by first genre
                const genreMap = {};
                genres.forEach(g => genreMap[g] = []);

                movies.forEach(movie => {
                    const firstGenre = movie.genres ? movie.genres.split('|')[0].trim() : '';
                    if (firstGenre && genreMap[firstGenre]) {
                        genreMap[firstGenre].push(movie);
                    }
                });

                // Create poster planes for aisle shelves
                genres.forEach((genre) => {
                    const aisle = aisleShelves[genre];
                    if (!aisle) return;

                    const moviesInGenre = genreMap[genre];
                    const posterWidth = 0.35;
                    const posterHeight = 0.52;
                    const zSpacing = posterWidth;
                    const levelHeights = [0.5, 1.5, 2.5, 3.5];

                    let movieIdx = 0;
                    levelHeights.forEach((levelY) => {
                        // Front side posters (facing -z direction, positive x offset)
                        const frontMovies = moviesInGenre.slice(movieIdx, movieIdx + 30);
                        let zOffset = aisle.zRange.min;

                        frontMovies.forEach((movie) => {
                            if (zOffset > aisle.zRange.max - posterWidth) return;

                            const posterGeometry = new THREE.PlaneGeometry(posterWidth, posterHeight);
                            const posterTexture = new THREE.TextureLoader();
                            const posterMaterial = new THREE.MeshLambertMaterial({
                                map: posterTexture.load(movie.poster_url, undefined, undefined, () => {}),
                                side: THREE.FrontSide
                            });

                            const poster = new THREE.Mesh(posterGeometry, posterMaterial);
                            poster.position.set(aisle.xPos + 0.3, levelY, zOffset);
                            poster.rotation.y = 0;
                            poster.castShadow = true;
                            poster.receiveShadow = true;
                            poster.userData = { movie };
                            scene.add(poster);
                            posterObjects.push(poster);

                            zOffset += zSpacing;
                        });

                        movieIdx += frontMovies.length;

                        // Back side posters (facing +z direction, negative x offset)
                        zOffset = aisle.zRange.min;
                        const backMovies = moviesInGenre.slice(movieIdx, movieIdx + 30);

                        backMovies.forEach((movie) => {
                            if (zOffset > aisle.zRange.max - posterWidth) return;

                            const posterGeometry = new THREE.PlaneGeometry(posterWidth, posterHeight);
                            const posterTexture = new THREE.TextureLoader();
                            const posterMaterial = new THREE.MeshLambertMaterial({
                                map: posterTexture.load(movie.poster_url, undefined, undefined, () => {}),
                                side: THREE.FrontSide
                            });

                            const poster = new THREE.Mesh(posterGeometry, posterMaterial);
                            poster.position.set(aisle.xPos - 0.3, levelY, zOffset);
                            poster.rotation.y = Math.PI;
                            poster.castShadow = true;
                            poster.receiveShadow = true;
                            poster.userData = { movie };
                            scene.add(poster);
                            posterObjects.push(poster);

                            zOffset += zSpacing;
                        });

                        movieIdx += backMovies.length;
                    });
                });

                // Distribute remaining movies across wall shelves
                const posterWidth = 0.35;
                const posterHeight = 0.52;
                const zSpacing = posterWidth;

                // Left wall shelves
                let remainingMovies = movies.slice(genres.length * 120); // Movies not yet placed
                let movieIdx = 0;
                shelfLevels.forEach((levelY) => {
                    let zOffset = wallShelves.left.zRange.min;

                    while (movieIdx < remainingMovies.length && zOffset < wallShelves.left.zRange.max - posterWidth) {
                        const movie = remainingMovies[movieIdx];
                        const posterGeometry = new THREE.PlaneGeometry(posterWidth, posterHeight);
                        const posterTexture = new THREE.TextureLoader();
                        const posterMaterial = new THREE.MeshLambertMaterial({
                            map: posterTexture.load(movie.poster_url, undefined, undefined, () => {}),
                            side: THREE.FrontSide
                        });

                        const poster = new THREE.Mesh(posterGeometry, posterMaterial);
                        poster.position.set(wallShelves.left.xPos, levelY, zOffset);
                        poster.rotation.y = -Math.PI / 2;
                        poster.castShadow = true;
                        poster.receiveShadow = true;
                        poster.userData = { movie };
                        scene.add(poster);
                        posterObjects.push(poster);

                        zOffset += zSpacing;
                        movieIdx++;
                    }
                });

                // Right wall shelves
                shelfLevels.forEach((levelY) => {
                    let zOffset = wallShelves.right.zRange.min;

                    while (movieIdx < remainingMovies.length && zOffset < wallShelves.right.zRange.max - posterWidth) {
                        const movie = remainingMovies[movieIdx];
                        const posterGeometry = new THREE.PlaneGeometry(posterWidth, posterHeight);
                        const posterTexture = new THREE.TextureLoader();
                        const posterMaterial = new THREE.MeshLambertMaterial({
                            map: posterTexture.load(movie.poster_url, undefined, undefined, () => {}),
                            side: THREE.FrontSide
                        });

                        const poster = new THREE.Mesh(posterGeometry, posterMaterial);
                        poster.position.set(wallShelves.right.xPos, levelY, zOffset);
                        poster.rotation.y = Math.PI / 2;
                        poster.castShadow = true;
                        poster.receiveShadow = true;
                        poster.userData = { movie };
                        scene.add(poster);
                        posterObjects.push(poster);

                        zOffset += zSpacing;
                        movieIdx++;
                    }
                });
            } catch (error) {
                console.error('Failed to load movies:', error);
            }
        }

        loadMovies();

        function showMovieTitle(movie) {
            const titleEl = document.getElementById('movieTitle');
            titleEl.textContent = movie.title || 'Untitled';
            titleEl.style.display = 'block';
        }

        function hideMovieTitle() {
            document.getElementById('movieTitle').style.display = 'none';
        }

        function showDetailOverlay(movie) {
            document.exitPointerLock?.();
            const overlay = document.getElementById('detailOverlay');
            const content = document.getElementById('detailContent');

            const html = `
                <img src="${movie.poster_url}" alt="${movie.title}" onerror="this.style.display='none'">
                <h2>${movie.title || 'Untitled'}</h2>
                ${movie.year ? `<p><strong>Year:</strong> ${movie.year}</p>` : ''}
                ${movie.format ? `<p><strong>Format:</strong> ${movie.format}</p>` : ''}
                ${movie.director ? `<p><strong>Director:</strong> ${movie.director}</p>` : ''}
                ${movie.runtime ? `<p><strong>Runtime:</strong> ${movie.runtime}</p>` : ''}
                ${movie.genres ? `<p><strong>Genres:</strong> ${movie.genres}</p>` : ''}
            `;

            content.innerHTML = html;
            overlay.style.display = 'flex';
        }

        function hideDetailOverlay() {
            document.getElementById('detailOverlay').style.display = 'none';
        }

        document.getElementById('detailOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('detailOverlay')) {
                hideDetailOverlay();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideDetailOverlay();
            }
        });

        // Player movement
        const keys = {};
        const moveVector = new THREE.Vector3();
        const velocity = new THREE.Vector3();
        const playerRadius = 0.4;
        let isWalking = false;

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // Mouse look with pointer lock
        let yaw = 0;
        let pitch = 0;
        let isPointerLocked = false;

        canvas.addEventListener('click', () => {
            // Check if hovering over a poster
            if (hoveredPoster && hoveredPoster.userData.movie) {
                showDetailOverlay(hoveredPoster.userData.movie);
            } else {
                canvas.requestPointerLock?.() ||
                canvas.mozRequestPointerLock?.() ||
                canvas.webkitRequestPointerLock?.();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === canvas;
            if (document.getElementById('detailOverlay').style.display === 'flex') {
                document.exitPointerLock?.();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isPointerLocked) {
                yaw -= e.movementX * 0.005;
                pitch -= e.movementY * 0.005;
                pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.exitPointerLock?.();
            }
        });

        // Collision detection
        function checkCollision(testPos) {
            for (let collider of shelfColliders) {
                const dx = testPos.x - collider.position.x;
                const dz = testPos.z - collider.position.z;

                const minX = -collider.width / 2 - playerRadius;
                const maxX = collider.width / 2 + playerRadius;
                const minZ = -collider.depth / 2 - playerRadius;
                const maxZ = collider.depth / 2 + playerRadius;

                if (dx > minX && dx < maxX && dz > minZ && dz < maxZ) {
                    return true;
                }
            }

            // Boundary collision
            const boundaryPadding = playerRadius + 0.5;
            if (testPos.x < -STORE_WIDTH / 2 + boundaryPadding ||
                testPos.x > STORE_WIDTH / 2 - boundaryPadding ||
                testPos.z < -STORE_DEPTH / 2 + boundaryPadding ||
                testPos.z > STORE_DEPTH / 2 - boundaryPadding) {
                return true;
            }

            return false;
        }

        // Animation loop
        let bobTime = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = Math.min(clock.getDelta(), 0.1);

            // Movement input
            moveVector.set(0, 0, 0);
            if (keys['w']) moveVector.z -= 1;
            if (keys['s']) moveVector.z += 1;
            if (keys['a']) moveVector.x -= 1;
            if (keys['d']) moveVector.x += 1;

            isWalking = moveVector.length() > 0;

            if (moveVector.length() > 0) {
                moveVector.normalize();

                // Rotate movement based on camera direction
                const angle = yaw + Math.atan2(moveVector.x, moveVector.z);
                const speed = 12;
                velocity.x = Math.sin(angle) * speed * deltaTime;
                velocity.z = Math.cos(angle) * speed * deltaTime;

                // Test collision
                const testPos = camera.position.clone();
                testPos.x += velocity.x;
                testPos.z += velocity.z;

                if (!checkCollision(testPos)) {
                    camera.position.x += velocity.x;
                    camera.position.z += velocity.z;
                }
            }

            // Camera bob while walking
            if (isWalking) {
                bobTime += deltaTime * 5;
                camera.position.y = 1.7 + Math.sin(bobTime) * 0.1;
            } else {
                camera.position.y = 1.7;
                bobTime = 0;
            }

            // Update camera rotation
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            // Raycasting for poster hover
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(posterObjects);

            if (intersects.length > 0) {
                const poster = intersects[0].object;
                if (hoveredPoster !== poster) {
                    hoveredPoster = poster;
                    showMovieTitle(poster.userData.movie);
                }
            } else {
                if (hoveredPoster) {
                    hoveredPoster = null;
                    hideMovieTitle();
                }
            }

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
